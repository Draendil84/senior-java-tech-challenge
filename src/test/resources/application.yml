spring:
  application:
    name: products-api-test

  datasource:
    url: jdbc:h2:mem:test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      initialization-fail-timeout: 0

  sql:
    init:
      mode: never

  cache:
    type: none

  jpa:
    defer-datasource-initialization: true

server:
  port: 8080

