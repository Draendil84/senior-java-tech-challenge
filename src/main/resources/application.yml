spring:
  application:
    name: products-api

  datasource:
    url: jdbc:h2:mem:productsdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true

  cache:
    type: simple

logging:
  level:
    root: INFO
    com.mango.products: DEBUG

server:
  port: 8080

